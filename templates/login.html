<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova — Knowledge Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">

    <div class="login-container">

        <div class="login-brand">
            <div class="brand-icon">TN</div>
            <h1>TechNova Solutions</h1>
            <p>Internal Knowledge Assistant</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="login-form">

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn-login">Sign In</button>

        </form>

        <div class="login-hint">
            <p>Demo accounts:</p>
            <div class="demo-accounts">
                <span class="demo-pill intern">alice / intern123</span>
                <span class="demo-pill engineer">bob / engineer123</span>
                <span class="demo-pill manager">carol / manager123</span>
                <span class="demo-pill executive">dave / executive123</span>
            </div>
        </div>

    </div>

</body>
</html>
